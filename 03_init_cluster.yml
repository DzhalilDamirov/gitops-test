---
- name: Initialize Kubernetes control-plane
  hosts: k8s_control_plane
  become: true

  tasks:
    - name: Check if Kubernetes is already initialized
      ansible.builtin.stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_admin_conf

    - name: Initialize Kubernetes cluster
      ansible.builtin.command: >
        kubeadm init
        --apiserver-advertise-address=192.168.56.10
        --pod-network-cidr=10.244.0.0/16
      when: not kubeadm_admin_conf.stat.exists

    - name: Create .kube directory for vagrant
      ansible.builtin.file:
        path: /home/vagrant/.kube
        state: directory
        owner: vagrant
        group: vagrant
        mode: "0755"

    - name: Copy kubeconfig for vagrant
      ansible.builtin.copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/vagrant/.kube/config
        owner: vagrant
        group: vagrant
        mode: "0600"
        remote_src: true

    - name: Install Flannel CNI
      become: false
      ansible.builtin.command: >
        kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
      environment:
        KUBECONFIG: /home/vagrant/.kube/config
      changed_when: false

    - name: Generate kubeadm join command
      ansible.builtin.command: kubeadm token create --print-join-command
      register: join_command
      changed_when: false

    - name: Save join command as fact
      ansible.builtin.set_fact:
        kubeadm_join_command: "{{ join_command.stdout }}"


- name: Join worker nodes
  hosts: k8s_workers
  become: true

  tasks:
    - name: Check if node already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Join worker to cluster
      ansible.builtin.command: "{{ hostvars[groups['k8s_control_plane'][0]].kubeadm_join_command }}"
      when: not kubelet_conf.stat.exists
