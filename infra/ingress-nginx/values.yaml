controller:
  replicaCount: 1

  nodeSelector:
    ingress-ready: "true"

  service:
    type: LoadBalancer
    externalTrafficPolicy: Cluster
    annotations:
      metallb.io/loadBalancerIPs: 192.168.56.40

  ingressClassResource:
    name: nginx
    enabled: true
    default: true

  ingressClass: nginx

  metrics:
    enabled: true
    service:
      enabled: true

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  admissionWebhooks:
    patch:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
