[defaults]
inventory = inventory.ini
host_key_checking = False
interpreter_python = /usr/bin/python3
timeout = 30
forks = 5
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .ansible_facts_cache
fact_caching_timeout = 86400
stdout_callback = yaml
retry_files_enabled = False

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o PreferredAuthentications=publickey -o PubkeyAuthentication=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o GSSAPIAuthentication=no -o IdentitiesOnly=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=3
control_path = %(directory)s/%%h-%%p-%%r
