apiVersion: v1
kind: Pod
metadata:
  name: nfs-test-pod
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.36
      command:
        - sh
        - -c
        - "echo 'nfs-ok' > /data/test.txt && cat /data/test.txt && sleep 30"
      volumeMounts:
        - name: data
          mountPath: /data
      resources:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          cpu: 25m
          memory: 32Mi
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: nfs-test-pvc
