apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-lab
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/DzhalilDamirov/gitops-test.git
    targetRevision: main
    path: clusters/home-lab

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
