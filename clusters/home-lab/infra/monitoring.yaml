apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "83.6.0"
    helm:
      releaseName: monitoring
      values: |
        defaultRules:
          create: false

        alertmanager:
          enabled: false

        grafana:
          enabled: true
          adminUser: admin
          adminPassword: admin123456

          nodeSelector:
            ingress-ready: "true"

          service:
            type: ClusterIP

          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: local-ca
            hosts:
              - grafana.local
            tls:
              - secretName: grafana-local-tls
                hosts:
                  - grafana.local

          persistence:
            enabled: true
            storageClassName: nfs-client
            size: 1Gi

          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi

        prometheusOperator:
          nodeSelector:
            ingress-ready: "true"

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 150m
              memory: 256Mi

        prometheus:
          prometheusSpec:
            nodeSelector:
              ingress-ready: "true"

            scrapeInterval: 10m
            scrapeTimeout: 30s
            evaluationInterval: 10m

            retention: 1d
            retentionSize: 1500MB

            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1536Mi

            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-client
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 3Gi

        kube-state-metrics:
          nodeSelector:
            ingress-ready: "true"

          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 100m
              memory: 192Mi

        prometheus-node-exporter:
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 80m
              memory: 96Mi

        kubeEtcd:
          enabled: false

        kubeControllerManager:
          enabled: false

        kubeScheduler:
          enabled: false

        kubeProxy:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
