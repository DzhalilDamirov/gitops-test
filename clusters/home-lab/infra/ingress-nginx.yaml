apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: "*"
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          replicaCount: 1

          nodeSelector:
            ingress-ready: "true"

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi

          metrics:
            enabled: false
            serviceMonitor:
              enabled: false

          service:
            type: LoadBalancer
            loadBalancerIP: 192.168.56.40
            externalTrafficPolicy: Local

          admissionWebhooks:
            enabled: true
            failurePolicy: Ignore
            patch:
              enabled: true

        defaultBackend:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
