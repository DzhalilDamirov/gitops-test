apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: rabbitmq
    targetRevision: "*"
    helm:
      releaseName: rabbitmq
      values: |
        global:
          security:
            allowInsecureImages: true

        image:
          registry: docker.io
          repository: bitnamilegacy/rabbitmq
          tag: 4.1.3-debian-12-r1

        replicaCount: 1

        auth:
          username: admin
          password: admin123456
          erlangCookie: home-lab-rabbitmq-cookie

        persistence:
          enabled: true
          storageClass: nfs-client
          size: 8Gi

        service:
          type: ClusterIP

        metrics:
          enabled: false

        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: rabbitmq

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
